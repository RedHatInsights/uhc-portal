name: Reviewer Workload Comment

on:
  workflow_run:
    workflows: ["Reviewer Workload Collect"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  post-comment:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download workload data
        uses: actions/download-artifact@v4
        with:
          name: workload-data
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post reviewer workload chart
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const REPO_OWNER = 'RedHatInsights';
            const REPO_NAME = 'uhc-portal';

            const payload = JSON.parse(fs.readFileSync('workload-data.json', 'utf8'));

            if (payload.skip) {
              console.log('PR author is not a team member — skipping chart comment.');
              return;
            }

            const { prNumber, results } = payload;

            if (!prNumber) {
              console.log('No PR number provided (dry run). Data collected successfully:');
              console.log(JSON.stringify(results, null, 2));
              return;
            }

            console.log(`Building chart for PR #${prNumber} with ${results.length} members...`);

            // Build QuickChart.io URL
            const labels = results.map(r => r.name);
            const pendingData = results.map(r => r.pending);
            const approvedData = results.map(r => r.approved);
            const maxVal = Math.max(...results.map(r => r.total), 1);

            const chartConfig = {
              type: 'bar',
              data: {
                labels,
                datasets: [
                  {
                    label: 'Pending',
                    data: pendingData,
                    backgroundColor: '#f59e0b'
                  },
                  {
                    label: 'Approved',
                    data: approvedData,
                    backgroundColor: '#34d399'
                  }
                ]
              },
              options: {
                scales: {
                  xAxes: [{ stacked: true, ticks: { fontColor: '#ccc' }, gridLines: { color: '#333' } }],
                  yAxes: [{
                    stacked: true,
                    ticks: { fontColor: '#ccc', beginAtZero: true, stepSize: 1, max: maxVal + 1 },
                    gridLines: { color: '#333' }
                  }]
                },
                legend: { labels: { fontColor: '#ccc' } },
                title: {
                  display: true,
                  text: 'Reviewer Workload (least busy first)',
                  fontColor: '#e5e7eb',
                  fontSize: 14
                },
                plugins: {
                  datalabels: {
                    display: true,
                    color: '#000',
                    font: { weight: 'bold', size: 11 },
                    formatter: '__FORMATTER__'
                  }
                }
              }
            };

            const chartJson = JSON.stringify(chartConfig)
              .replace('"__FORMATTER__"', "function(v){return v>0?v:''}");

            const chartUrl = `https://quickchart.io/chart?bkg=%230a0a0a&c=${encodeURIComponent(chartJson)}`;

            // Build the table
            const tableRows = results
              .filter(r => r.total > 0)
              .map(r => `| ${r.name} | @${r.github} | ${r.pending} | ${r.approved} | **${r.total}** |`)
              .join('\n');

            const tableHeader = `| Name | GitHub | Pending | Approved | Total |\n|------|--------|---------|----------|-------|\n`;

            const now = new Date(payload.timestamp).toISOString().replace('T', ' ').slice(0, 16) + ' UTC';

            const body = [
              `## Reviewer Workload`,
              ``,
              `![Reviewer Workload Chart](${chartUrl})`,
              ``,
              `<details><summary>View as table</summary>`,
              ``,
              tableHeader + tableRows,
              ``,
              `</details>`,
              ``,
              `> Snapshot at ${now}. Sorted by pending reviews (least busy first).`,
              `> **Pending** = awaiting review action | **Approved** = completed reviews on open PRs`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: REPO_OWNER,
              repo: REPO_NAME,
              issue_number: prNumber,
              body
            });

            console.log(`Posted workload chart comment on PR #${prNumber}`);
