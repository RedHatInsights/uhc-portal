apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/RedHatInsights/uhc-portal?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch
      == "main"
    pipelinesascode.tekton.dev/pipeline: https://raw.githubusercontent.com/RedHatInsights/konflux-pipelines/main/pipelines/platform-ui/docker-build-run-all-tests.yaml
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: ocm-ui
    appstudio.openshift.io/component: uhc-portal
    pipelines.appstudio.openshift.io/type: build
  name: uhc-portal-on-pull-request
  namespace: ocm-ui-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/ocm-ui-tenant/ocm-ui/uhc-portal:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: build-tools/Dockerfile
  - name: test-app-name
    value: uhc-portal
  - name: test-app-port
    value: "8000"
  - name: unit-tests-script
    value: |
      #!/bin/bash
      set -ex
      npm install -g yarn
      yarn install
      # cap the linter's heap size, as it tends to hog the RAM,
      # causing the OS to kill the process due to out-of-memory errors
      NODE_OPTIONS='--max-old-space-size=4096' yarn lint
      yarn prettier
      yarn test --run-in-band --no-cache
  - name: run-app-script
    value: |
      #!/bin/sh
      set -e
      echo "Starting application with Caddy using ConfigMap Caddyfile..."
      exec caddy run --config /etc/caddy/Caddyfile
  - name: e2e-tests-script
    value: |
      #!/bin/bash
      set -e  # Don't use -x to avoid printing secrets in logs

      # CI mode: enables retries (2) and parallel workers (4) in playwright.config.ts
      export CI=true
      # Accept self-signed TLS certs at the Node.js level (covers test helpers,
      # custom commands, and any non-browser HTTPS calls to the proxy)
      export NODE_TLS_REJECT_UNAUTHORIZED=0
      # Browser navigates directly to the proxy sidecar on prod.foo, which is
      # whitelisted in sso.redhat.com so SSO accepts the redirect_uri natively.
      export BASE_URL="https://prod.foo.redhat.com:1337/openshift/"

      # Wait for dev server to be ready
      timeout 120s bash -c 'until curl -k https://prod.foo.redhat.com:1337 > /dev/null 2>&1; do
        echo "Waiting for dev server to be ready"
        sleep 5
      done'
      echo "Dev server ready!"

      # Install Playwright browsers
      echo "Installing Playwright browsers..."
      npx playwright install --with-deps chromium

      # Run CI-tagged tests — capture exit code so we can collect artifacts on failure
      echo "Running Playwright tests..."
      set +e
      yarn playwright-e2e-ci --project=chromium
      TEST_EXIT_CODE=$?
      set -e

      # === Results summary ===
      RESULTS_JSON="playwright-artifacts/results/test-results.json"
      RESULTS_DIR="playwright-artifacts/results"

      echo ""
      echo "============================================"
      echo "  Playwright E2E Test Summary"
      echo "============================================"

      if [ -f "$RESULTS_JSON" ]; then
        # Extract and print a concise summary from the JSON results using Node.js
        node -e "
          const r = require('./$RESULTS_JSON');
          const suites = r.suites || [];
          let passed=0, failed=0, skipped=0, flaky=0;
          function walk(s) {
            (s.suites||[]).forEach(walk);
            (s.specs||[]).forEach(spec => {
              (spec.tests||[]).forEach(t => {
                if (t.status==='expected') passed++;
                else if (t.status==='unexpected') failed++;
                else if (t.status==='skipped') skipped++;
                else if (t.status==='flaky') flaky++;
              });
            });
          }
          suites.forEach(walk);
          const total = passed+failed+skipped+flaky;
          console.log('  Total:   ' + total);
          console.log('  Passed:  ' + passed);
          console.log('  Failed:  ' + failed);
          console.log('  Skipped: ' + skipped);
          console.log('  Flaky:   ' + flaky);
          if (failed > 0) {
            console.log('');
            console.log('  Failed tests:');
            function listFailed(s, path) {
              const p = path ? path + ' > ' + s.title : s.title;
              (s.suites||[]).forEach(c => listFailed(c, p));
              (s.specs||[]).forEach(spec => {
                (spec.tests||[]).forEach(t => {
                  if (t.status==='unexpected') console.log('    ✗ ' + p + ' > ' + spec.title);
                });
              });
            }
            suites.forEach(s => listFailed(s, ''));
          }
        " 2>/dev/null || echo "  (Could not parse test results JSON)"
      else
        echo "  No test results JSON found"
      fi

      # List failure artifacts if any exist
      if [ -d "$RESULTS_DIR" ]; then
        ARTIFACT_COUNT=$(find "$RESULTS_DIR" -type f \( -name "*.png" -o -name "*.webm" -o -name "*.zip" \) 2>/dev/null | wc -l)
        if [ "$ARTIFACT_COUNT" -gt 0 ]; then
          echo ""
          echo "  Failure artifacts ($ARTIFACT_COUNT files):"
          find "$RESULTS_DIR" -type f \( -name "*.png" -o -name "*.webm" -o -name "*.zip" \) -printf "    %f (%s bytes)\n" 2>/dev/null \
            || find "$RESULTS_DIR" -type f \( -name "*.png" -o -name "*.webm" -o -name "*.zip" \) -exec ls -lh {} \;
        fi
      fi

      echo "============================================"
      echo "  Exit code: $TEST_EXIT_CODE"
      echo "============================================"

      exit $TEST_EXIT_CODE
  - name: e2e-credentials-secret
    value: ocm-ui-credentials-secret
  - name: frontend-proxy-routes-configmap
    value: ocm-ui-dev-proxy-caddyfile
  - name: e2e-hcc-env
    value: prod
  - name: e2e-hcc-env-url
    value: https://console.dev.redhat.com
  pipelineRef:
    name: docker-build
  taskRunTemplate:
    serviceAccountName: build-pipeline-uhc-portal
  taskRunSpecs:
    # extend the unit-tests pipeline task to increase RAM
    - pipelineTaskName: run-unit-tests
      stepSpecs:
        - name: unit-tests
          computeResources:
            requests:
              memory: "6Gi"
            limits:
              memory: "6Gi"
    - pipelineTaskName: run-e2e-tests
      stepSpecs:
        - name: e2e-tests
          computeResources:
            requests:
              memory: "10Gi"
            limits:
              memory: "10Gi"
      podTemplate:
        hostAliases:
          - ip: "::1"
            hostnames:
              - "prod.foo.redhat.com"
          - ip: "127.0.0.1"
            hostnames:
              - "prod.foo.redhat.com"
        volumes:
          - name: test-app-caddyfile
            configMap:
              name: ocm-ui-app-caddy-config
      sidecarSpecs:
        - name: run-application
          volumeMounts:
            - name: test-app-caddyfile
              mountPath: /etc/caddy
  workspaces:
  - name: workspace
    volumeClaimTemplate:
      metadata:
        creationTimestamp: null
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
      status: {}
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
